project:
  sourceknight: 0.3
  name: ProxyKillerDiscord

  dependencies:
    - name: sourcemod
      type: tar
      version: 1.12
      location: https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git7165-linux.tar.gz
      unpack:
        - source: /addons
          dest: /addons

    - name: proxyKiller
      type: git
      repo: https://github.com/srcdslab/sm-plugin-ProxyKiller
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: discordwebapi
      type: git
      repo: https://github.com/srcdslab/sm-plugin-DiscordWebhookAPI
      unpack:
        - source: /include
          dest: /addons/sourcemod/scripting/include

    - name: Extended-Discord
      type: git
      repo: https://github.com/srcdslab/sm-plugin-Extended-Discord
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

  root: /
  output: /addons/sourcemod/plugins

  targets:
    - ProxyKillerDiscord
